# R3 RAG 청킹 전략 프리셋
# 사용: uv run python scripts/collect_laws.py --config C1

C0:
  name: C0
  description: "현재 기준점 - 항 단위 청킹, 추가 옵션 없음"
  chunk_unit: paragraph
  multi_granularity: []
  prefix: none
  top_k: 5
  hybrid: false
  min_tokens: null
  max_tokens: null
  overlap: 0

C1:
  name: C1
  description: "구조 신호 강화한 기본형 - 항 단위 + prefix + hybrid"
  chunk_unit: paragraph
  multi_granularity: [paragraph]
  prefix: article_only
  top_k: 5
  hybrid: true
  min_tokens: 120
  max_tokens: 800
  overlap: 0

C2:
  name: C2
  description: "요건/예외 질문 recall 향상 - 항+호 멀티 인덱싱"
  chunk_unit: paragraph
  multi_granularity: [paragraph, subparagraph]
  prefix: article_only
  top_k: 5
  hybrid: true
  min_tokens: 100
  max_tokens: 800
  overlap: 0

C3:
  name: C3
  description: "설명형 질문 대응력 향상 - 더 큰 chunk + top-k 8"
  chunk_unit: paragraph
  multi_granularity: [paragraph, subparagraph]
  prefix: article_only
  top_k: 8
  hybrid: true
  min_tokens: 150
  max_tokens: 1000
  overlap: 0

C4:
  name: C4
  description: "여러 법령 혼재 환경 안정화 - 법령명 prefix 포함"
  chunk_unit: paragraph
  multi_granularity: [paragraph, subparagraph]
  prefix: law_and_article
  top_k: 5
  hybrid: true
  min_tokens: 120
  max_tokens: 800
  overlap: 0

C5:
  name: C5
  description: "멀티 그래뉼러리티 최대치 - 조+항+호 동시 인덱싱"
  chunk_unit: article
  multi_granularity: [article, paragraph, subparagraph]
  prefix: article_only
  top_k: 8
  hybrid: true
  min_tokens: 150
  max_tokens: 1000
  overlap: 0

C6:
  name: C6
  description: "C0와 청킹 단위만 비교 - 조 단위 청킹"
  chunk_unit: article
  multi_granularity: []
  prefix: none
  top_k: 5
  hybrid: false
  min_tokens: null
  max_tokens: null
  overlap: 0
