[project]
name = "ai-agent-backend"
version = "0.1.0"
description = "FastAPI + LangGraph 기반 AI Agent Backend"
requires-python = ">=3.12,<3.13"

dependencies = [
  # API Server
  "fastapi==0.128.*",
  "uvicorn[standard]==0.40.*",
  # Config & Validation
  "pydantic==2.12.*",
  "pydantic-settings==2.12.*",
  # LLM / Agent
  "langgraph==1.0.5",
  "langchain==1.2.*",
  "langchain-openai==1.1.*",
  "openai==2.14.0",
  # Utils
  "python-dotenv>=1.0.1",
  "httpx>=0.27.0",
  "tenacity>=8.3.0",
  "langchain-community==0.4.1",
]

[tool.uv]
package = true

[tool.uv.sources]
# 필요 시 private repo나 로컬 패키지 추가 가능
