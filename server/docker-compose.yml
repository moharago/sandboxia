# =============================================================================
# Docker Compose - FastAPI + Qdrant
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI Server
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/kernelacademy-aicamp/server-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sandbox-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
    restart: always
    networks:
      - sandbox-network
    healthcheck:
      test: [
          "CMD-SHELL",
          "python -c \"import urllib.request; import sys; \
          u=['http://localhost:8000/health','http://localhost:8000/docs']; \
          ok=False; \
          for url in u: \
          try: urllib.request.urlopen(url, timeout=3); ok=True; break; \
          except Exception: pass; \
          sys.exit(0 if ok else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Qdrant (Vector Database) - Hybrid Search (Dense + Sparse)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: sandbox-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: always
    networks:
      - sandbox-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

# =============================================================================
# Networks
# =============================================================================
networks:
  sandbox-network:
    driver: bridge
