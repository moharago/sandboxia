# =============================================================================
# Docker Compose - FastAPI + ChromaDB
# =============================================================================
# 사용법:
#   개발: docker-compose up --build
#   백그라운드: docker-compose up -d --build
#   종료: docker-compose down
#   로그: docker-compose logs -f api

services:
  # ---------------------------------------------------------------------------
  # FastAPI Server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sandbox-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker 전용 설정 (컨테이너 내부 경로)
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIR=/app/data/chroma
    volumes:
      # ChromaDB 데이터 영속성 (로컬 persist 모드용)
      - chroma_data:/app/data/chroma
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sandbox-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # ChromaDB (Vector Database)
  # ---------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:latest
    container_name: sandbox-chroma
    ports:
      - "8001:8000"  # 호스트 8001 → 컨테이너 8000
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - sandbox-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# =============================================================================
# Networks
# =============================================================================
networks:
  sandbox-network:
    driver: bridge

# =============================================================================
# Volumes (데이터 영속성)
# =============================================================================
volumes:
  chroma_data:
    driver: local
