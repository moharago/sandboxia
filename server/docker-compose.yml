# =============================================================================
# Docker Compose - FastAPI + ChromaDB
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI Server
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/kernelacademy-aicamp/server-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sandbox-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      chroma:
        condition: service_started
    restart: always
    networks:
      - sandbox-network
    healthcheck:
      # /health가 없을 수도 있어서 더 보수적으로 체크:
      # 1) /health 시도 -> 실패하면 2) /docs 시도
      test: [
          "CMD-SHELL",
          "python -c \"import urllib.request; import sys; \
          u=['http://localhost:8000/health','http://localhost:8000/docs']; \
          ok=False; \
          for url in u: \
          try: urllib.request.urlopen(url, timeout=3); ok=True; break; \
          except Exception: pass; \
          sys.exit(0 if ok else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # ChromaDB (Vector Database)
  # ---------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:1.4.1
    container_name: sandbox-chroma
    ports:
      - "8001:8000" # 호스트 8001 → 컨테이너 8000
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - ./data/chroma:/data # ChromaDB 데이터는 ./data/chroma에 bind mount됨
    restart: always
    networks:
      - sandbox-network
    # ⚠️ 초기 배포에서는 healthcheck로 막히는 경우가 많아서 일단 제거 추천.
    # Chroma가 실제로 뜨면 API가 붙고, 붙는 과정에서 문제를 확인하는 게 더 빠릅니다.
    #
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/heartbeat >/dev/null || curl -fsS http://localhost:8000/api/v2/heartbeat >/dev/null || curl -fsS http://localhost:8000/ >/dev/null"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 20s

# =============================================================================
# Networks
# =============================================================================
networks:
  sandbox-network:
    driver: bridge
